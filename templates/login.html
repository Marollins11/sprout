<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprout — Sign In</title>
  <style>
    :root { --bg:#0f1117; --surface:#1a1d2e; --border:#2d3154; --text:#e2e8f0;
            --text-muted:#94a3b8; --accent:#4d5498; --accent-hover:#5d64b8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
           background:var(--bg); color:var(--text); min-height:100vh;
           display:flex; align-items:center; justify-content:center; }
    .card { background:var(--surface); border:1px solid var(--border);
            border-radius:16px; padding:36px; width:360px;
            box-shadow:0 20px 60px rgba(0,0,0,0.4); }
    h1 { font-size:22px; font-weight:700; margin-bottom:4px; }
    .sub { font-size:13px; color:var(--text-muted); margin-bottom:28px; }
    .google-btn { display:flex; align-items:center; justify-content:center; gap:10px;
                  width:100%; padding:11px; background:#fff; color:#1a1a1a; border:none;
                  border-radius:8px; font-size:14px; font-weight:500; cursor:pointer;
                  margin-bottom:20px; text-decoration:none; transition:background 0.15s; }
    .google-btn:hover { background:#f1f1f1; }
    .divider { display:flex; align-items:center; gap:12px; margin-bottom:20px;
               color:var(--text-muted); font-size:12px; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
    label { display:block; font-size:11px; color:var(--text-muted); text-transform:uppercase;
            letter-spacing:0.06em; margin-bottom:4px; margin-top:14px; }
    input { width:100%; padding:9px 12px; background:var(--bg); border:1px solid var(--border);
            border-radius:8px; color:var(--text); font-size:14px; }
    input:focus { outline:1px solid var(--accent); border-color:var(--accent); }
    .btn { width:100%; padding:10px; background:var(--accent); color:#fff; border:none;
           border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:18px;
           transition:background 0.15s; }
    .btn:hover { background:var(--accent-hover); }
    .toggle { text-align:center; margin-top:16px; font-size:13px; color:var(--text-muted); }
    .toggle a { color:var(--accent); cursor:pointer; }
    .toggle a:hover { text-decoration:underline; }
    .flash { padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; }
    .flash.error   { background:#7f1d1d; border:1px solid #b91c1c; color:#fca5a5; }
    .flash.success { background:#14532d; border:1px solid #16a34a; color:#86efac; }
  </style>
</head>
<body>
<div class="card">
  <h1>🌱 Sprout</h1>
  <p class="sub">Your personal desk assistant</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <a href="/auth/google/start" class="google-btn">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.7 0 6.7 5.5 2.7 13.5l7.8 6C12.4 13 17.8 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
      <path fill="#FBBC05" d="M10.5 28.5A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.1.8-4.5l-7.8-6A24 24 0 0 0 0 24c0 3.8.9 7.4 2.5 10.5l8-6z"/>
      <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.3-8.4 2.3-6.2 0-11.5-4.2-13.4-9.8l-8 6.2C6.7 42.5 14.7 48 24 48z"/>
    </svg>
    Continue with Google
  </a>

  <div class="divider">or</div>

  <div id="login-form">
    <form method="POST" action="/login">
      <input type="hidden" name="mode" value="login">
      <label>Email</label>
      <input type="email" name="email" required autocomplete="email" />
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password" />
      <button class="btn" type="submit">Sign In</button>
    </form>
    <div class="toggle">No account? <a onclick="showRegister()">Create one</a></div>
  </div>

  <div id="register-form" style="display:none">
    <form method="POST" action="/login">
      <input type="hidden" name="mode" value="register">
      <label>Email</label>
      <input type="email" name="email" required autocomplete="email" />
      <label>Password</label>
      <input type="password" name="password" required autocomplete="new-password" />
      <button class="btn" type="submit">Create Account</button>
    </form>
    <div class="toggle">Have an account? <a onclick="showLogin()">Sign in</a></div>
  </div>
</div>
<script>
  function showRegister() {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = '';
  }
  function showLogin() {
    document.getElementById('register-form').style.display = 'none';
    document.getElementById('login-form').style.display = '';
  }
</script>
</body>
</html>
